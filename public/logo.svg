<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d06e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#c8960c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a07010;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe88a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- B letter -->
  <g filter="url(#glow)">
    <!-- B vertical bar -->
    <rect x="30" y="25" width="18" height="130" fill="url(#goldGrad)" rx="2"/>
    <!-- B top bump -->
    <path d="M48 25 Q100 25 100 55 Q100 85 48 85 Z" fill="url(#goldGrad)"/>
    <!-- B bottom bump -->
    <path d="M48 85 Q108 85 108 115 Q108 155 48 155 Z" fill="url(#goldGrad)"/>
    <!-- B inner cutouts -->
    <path d="M55 35 Q88 35 88 55 Q88 72 55 72 Z" fill="#0a0a0a"/>
    <path d="M55 98 Q92 98 92 118 Q92 138 55 138 Z" fill="#0a0a0a"/>

    <!-- H vertical bars -->
    <rect x="120" y="25" width="18" height="130" fill="url(#goldGrad)" rx="2"/>
    <rect x="162" y="25" width="18" height="130" fill="url(#goldGrad)" rx="2"/>
    <!-- H crossbar -->
    <rect x="120" y="82" width="60" height="18" fill="url(#goldGrad)" rx="2"/>

    <!-- Light spark at H crossbar center -->
    <circle cx="150" cy="91" r="4" fill="#fffbe0" opacity="0.95" filter="url(#glow)"/>
    <line x1="150" y1="75" x2="150" y2="107" stroke="#fffbe0" stroke-width="1.5" opacity="0.7"/>
    <line x1="134" y1="91" x2="166" y2="91" stroke="#fffbe0" stroke-width="1.5" opacity="0.7"/>
  </g>
</svg>
